name: Run KS Panel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./prisma/dev.db"

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install --omit=dev

      # Step 4: Run Prisma migrate
      - name: Run migrations
        run: npx prisma migrate deploy

      # Step 5: Generate Prisma client
      - name: Generate Prisma Client
        run: npx prisma generate

      # Step 6: Build TypeScript
      - name: Build project
        run: npm run build-ts

      # Step 7: Seed database
      - name: Seed database
        run: npm run seed

      # Step 8: Create user
      - name: Create user
        run: npm run create:user -- --username=kshosting --email=kshosting@ksmail.com --password=kshosting@55

      # Step 9: Download cloudflared
      - name: Download cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      # Step 10: Run cloudflared tunnel (background)
      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --no-autoupdate run --token eyJhIjoiZTJkZjY3MDI5ZWZlZTBmY2JhM2ExMjNjN2VmNTcxNTAiLCJ0IjoiMGQ2Yzk5YjQtMGUzZC00NzEyLWFmNDctNzM0MGU5YTEyOGE3IiwicyI6IlkyVTNOelV5WmpBdFl6SmpOeTAwTjJZMExUbGpNMk10T0dJelltRmtOREk1T1dOaCJ9 &

      # Step 11: Start KS Panel
      - name: Start KS Panel
        run: npm run start
