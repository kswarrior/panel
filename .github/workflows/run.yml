name: Run KS Panel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./prisma/dev.db"

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install --omit=dev

      # 4️⃣ Run Prisma migrations (CI safe)
      - name: Run migrations
        run: npx prisma migrate deploy

      # 5️⃣ Generate Prisma client
      - name: Generate Prisma Client
        run: npx prisma generate

      # 6️⃣ Build project (FIXED HERE)
      - name: Build project
        run: npm run build

      # 7️⃣ Seed database
      - name: Seed database
        run: npm run seed

      # 8️⃣ Create admin user
      - name: Create user
        run: npm run create:user -- --username=kshosting --email=kshosting@ksmail.com --password=kshosting@55

      # 9️⃣ Install cloudflared
      - name: Install cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      # 🔟 Start tunnel in background
      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --no-autoupdate run --token ${{ secrets.CLOUDFLARE_TOKEN }} &

      # 1️⃣1️⃣ Start KS Panel
      - name: Start KS Panel
        run: npm run start

      # Keep workflow alive
      - name: Keep Alive
        run: sleep infinity
