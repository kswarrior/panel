name: Run KS Panel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./prisma/dev.db"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # ✅ Install ALL deps (including dev)
      - name: Install dependencies
        run: npm install

      - name: Run Prisma migrate
        run: npx prisma migrate deploy

      - name: Generate Prisma Client
        run: npx prisma generate

      # ✅ Now TypeScript will work
      - name: Build project
        run: npm run build

      - name: Seed database
        run: npm run seed

      - name: Create user script
        run: |
          cat <<EOF > createUser.ts
          import { PrismaClient } from '@prisma/client';
          import bcrypt from 'bcrypt';

          const prisma = new PrismaClient();

          async function main() {
            const username = process.argv[2];
            const email = process.argv[3];
            const password = process.argv[4];

            if (!username || !email || !password) {
              console.error('Usage: ts-node createUser.ts <username> <email> <password>');
              process.exit(1);
            }

            const hashedPassword = await bcrypt.hash(password, 10);

            await prisma.users.upsert({
              where: { email },
              update: {},
              create: {
                username,
                email,
                password: hashedPassword,
                isAdmin: true,
              },
            });

            console.log('User created or already exists');
          }

          main()
            .catch(e => {
              console.error(e);
              process.exit(1);
            })
            .finally(async () => {
              await prisma.\$disconnect();
            });
          EOF

      - name: Create user
        run: ts-node createUser.ts kshosting kshosting@ksmail.com kshosting@55

      - name: Install cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --no-autoupdate run --token \${{ secrets.CLOUDFLARE_TOKEN }} &

      - name: Start KS Panel
        run: npm run start

      - name: Keep Alive
        run: sleep infinity
